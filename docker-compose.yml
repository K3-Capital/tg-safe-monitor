services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-safe-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_safe_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-tg_safe_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tg_safe_monitor}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tg_safe_monitor} -d ${POSTGRES_DB:-tg_safe_monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  tg-safe-monitor:
    build: .
    container_name: tg-safe-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-tg_safe_monitor}:${POSTGRES_PASSWORD:-tg_safe_monitor}@postgres:5432/${POSTGRES_DB:-tg_safe_monitor}}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: